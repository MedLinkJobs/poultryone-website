kind = "web"
previewPath = "/"
title = "PoultryOne Website"
version = "1.0.0"
id = "artifacts/poultryone-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25783

[services.development]
run = "pnpm --filter @workspace/poultryone-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poultryone-website", "run", "build" ]
publicDir = "artifacts/poultryone-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25783"
BASE_PATH = "/"
